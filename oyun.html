<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Tournament</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#443a74"/>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(() => {});
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root {
            --primary-rgb: 189, 179, 255;
            --primary: rgb(var(--primary-rgb));
            --on-primary: #2d235c;
            --primary-container: #443a74;
            --au-rgb: 100, 220, 180;
            --au: rgb(var(--au-rgb));
            --bg: #131318;
            --on-bg: #e5e1e6;
            --surface: #201f25;
            --surface-high: #2a2830;
            --on-surface-var: #c8c4d0;
            --outline-var: #48454e;
            --danger: #ef5350;
            --gold: #FFD700;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg); color: var(--on-bg); overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 15% 25%, rgba(var(--primary-rgb),.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 65%, rgba(140,179,255,.12) 0%, transparent 45%);
            animation: aurora 20s infinite alternate ease-in-out;
        }
        @keyframes aurora {
            from { transform: translate(0,0) rotate(0deg) scale(1.2); }
            to   { transform: translate(5vw,-5vh) rotate(10deg) scale(1.2); }
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 20px; border-radius: 99px; font-weight: 700;
            border: 1px solid transparent; cursor: pointer; transition: all .2s;
        }
        .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,.3); }
        .btn:disabled { opacity: .45; cursor: not-allowed; }
        .btn-primary   { background: var(--primary); color: var(--on-primary); }
        .btn-secondary { background: var(--surface-high); color: var(--on-surface-var); border-color: var(--outline-var); }
        .btn-danger    { background: var(--danger); color: #fff; }
        .btn-au        { background: rgba(var(--au-rgb),.15); color: var(--au); border-color: rgba(var(--au-rgb),.4); }

        .form-select, .form-input {
            background: var(--surface-high); border: 1px solid var(--outline-var);
            color: var(--on-bg); border-radius: 8px; padding: 11px 14px; width: 100%;
        }
        .form-select:focus, .form-input:focus { border-color: var(--primary); outline: none; }

        /* ── Screens ── */
        .screen { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .screen.hidden { display: none; }

        /* ── Setup card ── */
        .setup-card { background: var(--surface); border: 1px solid var(--outline-var); border-radius: 20px; padding: 2rem; width: 100%; max-width: 520px; box-shadow: 0 24px 48px rgba(0,0,0,.35); }

        /* ── Mode chips ── */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-chip {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            border-radius: 12px; cursor: pointer; border: 2px solid var(--outline-var);
            background: var(--surface-high); transition: all .18s; font-size: .85rem; font-weight: 600;
        }
        .mode-chip:hover { border-color: rgba(var(--primary-rgb),.5); }
        .mode-chip.selected { border-color: var(--primary); background: rgba(var(--primary-rgb),.12); color: var(--primary); }
        .mode-chip.au-chip.selected { border-color: var(--au); background: rgba(var(--au-rgb),.12); color: var(--au); }
        .mode-chip input { display: none; }
        .mode-chip .chip-icon { font-size: 18px; flex-shrink: 0; }

        /* ── Contestant cards ── */
        .contestant-card {
            background: var(--surface); border: 3px solid transparent;
            border-radius: 18px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,.35);
            transition: border-color .25s, transform .25s, box-shadow .25s;
            cursor: pointer; aspect-ratio: 2/3; position: relative;
        }
        .contestant-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 16px 36px rgba(0,0,0,.5); }
        .contestant-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .contestant-card.winner-glow { animation: winner-pulse 1s ease-in-out; border-color: var(--gold); }
        @keyframes winner-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,215,0,.7); }
            70%  { box-shadow: 0 0 10px 20px rgba(255,215,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
        }
        .contestant-card.au-card { border-color: rgba(var(--au-rgb),.5); }
        .contestant-card.au-card:hover { border-color: var(--au); }

        /* ── VS ── */
        .vs-bubble {
            background: var(--primary); color: var(--on-primary);
            border: 4px solid var(--bg); box-shadow: 0 0 20px rgba(var(--primary-rgb),.5);
            border-radius: 50%; width: 64px; height: 64px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 900; flex-shrink: 0;
        }

        /* ── Leaderboard ── */
        .lb-row {
            display: flex; align-items: center; gap: 16px; padding: 12px 16px;
            border-radius: 12px; background: var(--surface-high);
        }
        .lb-rank { font-size: 1.1rem; font-weight: 800; width: 28px; text-align: center; }
        .lb-rank.gold   { color: var(--gold); }
        .lb-rank.silver { color: #c0c0c0; }
        .lb-rank.bronze { color: #cd7f32; }

        /* ── Modal ── */
        .modal-bg { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; }
        .modal-bg.hidden { display: none; }
        .modal-box { background: var(--surface-high); border: 1px solid var(--outline-var); border-radius: 20px; padding: 2rem; width: 100%; max-width: 400px; }

        /* ── AU badge on contestant name ── */
        .au-badge-small {
            display: inline-block; font-size: .65rem; font-weight: 700; padding: 1px 7px;
            border-radius: 99px; background: rgba(var(--au-rgb),.15);
            border: 1px solid rgba(var(--au-rgb),.4); color: var(--au);
            vertical-align: middle; margin-left: 6px;
        }

        /* ── Progress bar ── */
        .progress-bar { height: 4px; border-radius: 2px; background: var(--outline-var); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; background: var(--primary); transition: width .4s ease; }
    </style>
</head>
<body class="p-4 sm:p-6">
<div id="app" class="max-w-screen-lg mx-auto">

    <!-- HEADER -->
    <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 pb-4 border-b gap-4" style="border-color:var(--outline-var)">
        <div>
            <h1 class="text-4xl font-extrabold" style="color:var(--primary)">
                <a href="oyun.html" class="hover:opacity-80 transition-opacity">Character Tournament</a>
            </h1>
            <p class="text-base mt-1" style="color:var(--on-surface-var)">Pick your favourite</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <a href="index.html" class="btn btn-secondary">

            </a>
            <button id="leaderboard-btn" class="btn btn-secondary">

            <button id="manage-categories-btn" class="btn btn-secondary hidden">

            <button id="auth-action-btn" class="btn btn-secondary">
                <span id="auth-action-icon" class="material-symbols-outlined">login</span>
                <span id="auth-action-text">Sign In</span>
            </button>
        </div>
    </header>

    <!-- SETUP SCREEN -->
    <main id="setup-screen" class="screen">
        <div class="setup-card">
            <h2 class="text-2xl font-bold mb-6 text-center">Tournament Setup</h2>
            <form id="setup-form" class="flex flex-col gap-5">

                <!-- Mode chips -->
                <div>
                    <label class="block font-semibold mb-3 text-sm uppercase tracking-wide" style="color:var(--on-surface-var)">Mode</label>
                    <div class="mode-grid" id="mode-grid">
                        <label class="mode-chip selected">
                            <input type="radio" name="mode" value="random" checked>
                            <span class="material-symbols-outlined chip-icon">shuffle</span>Random
                        </label>
                        <label class="mode-chip">
                            <input type="radio" name="mode" value="all">
                            <span class="material-symbols-outlined chip-icon">apps</span>All
                        </label>
                        <label class="mode-chip">
                            <input type="radio" name="mode" value="stars_1">
                            <span class="material-symbols-outlined chip-icon text-orange-400">filter_1</span>1★ Only
                        </label>
                        <label class="mode-chip">
                            <input type="radio" name="mode" value="stars_2">
                            <span class="material-symbols-outlined chip-icon text-slate-400">filter_2</span>2★ Only
                        </label>
                        <label class="mode-chip">
                            <input type="radio" name="mode" value="stars_3">
                            <span class="material-symbols-outlined chip-icon text-amber-400">filter_3</span>3★ Only
                        </label>
                        <label class="mode-chip">
                            <input type="radio" name="mode" value="fusions">
                            <span class="material-symbols-outlined chip-icon text-fuchsia-400">filter_4</span>Fusions
                        </label>
                        <label class="mode-chip" style="grid-column:span 2">
                            <input type="radio" name="mode" value="absolute_war">

                    </div>
                </div>

                <!-- Random count (shown only for random mode) -->
                <div id="random-count-container">
                    <label class="block font-semibold mb-2 text-sm" for="char-count">Random character count</label>
                    <input type="number" id="char-count" name="count" value="16" min="4" max="128" class="form-select">
                </div>

                <!-- Category -->
                <div>
                    <label class="block font-semibold mb-2 text-sm uppercase tracking-wide" style="color:var(--on-surface-var)">Category</label>
                    <div id="category-container" class="grid grid-cols-2 gap-2"></div>
                </div>

                <button type="submit" class="btn btn-primary w-full text-base mt-2">
                    <span class="material-symbols-outlined">sports_esports</span>Start Tournament
                </button>
            </form>
        </div>

        <!-- Logged-out prompt -->
        <div id="login-prompt" class="hidden text-center p-8 rounded-2xl mt-4" style="background:var(--surface);border:1px solid var(--outline-var)">
            <span class="material-symbols-outlined text-5xl mb-3" style="color:var(--primary)">lock</span>
            <h2 class="text-xl font-bold mb-1">Sign in to play</h2>
            <p style="color:var(--on-surface-var)">Use the Sign In button above to continue.</p>
        </div>
    </main>

    <!-- GAME SCREEN -->
    <main id="game-screen" class="screen hidden">
        <div class="w-full max-w-3xl">
            <!-- Round info -->
            <div class="text-center mb-4">
                <h2 id="round-title" class="text-2xl font-bold" style="color:var(--primary)"></h2>
                <p id="match-info" class="text-base mt-1" style="color:var(--on-surface-var)"></p>
                <p id="category-info" class="text-sm font-semibold mt-1" style="color:var(--on-surface-var)"></p>
                <div class="progress-bar mt-3 mx-auto max-w-xs">
                    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                </div>
            </div>
            <!-- Match -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 sm:gap-10 relative">
                <div class="w-full max-w-[200px] sm:max-w-[240px] flex flex-col items-center gap-3">
                    <div id="contestant-1-card" class="contestant-card w-full">
                        <img id="contestant-1-img" src="" alt="">
                    </div>
                    <h3 id="contestant-1-name" class="text-lg font-bold text-center leading-tight"></h3>
                </div>
                <div class="vs-bubble flex-shrink-0">VS</div>
                <div class="w-full max-w-[200px] sm:max-w-[240px] flex flex-col items-center gap-3">
                    <div id="contestant-2-card" class="contestant-card w-full">
                        <img id="contestant-2-img" src="" alt="">
                    </div>
                    <h3 id="contestant-2-name" class="text-lg font-bold text-center leading-tight"></h3>
                </div>
            </div>
            <p id="login-to-save-info" class="text-center text-sm mt-4 text-yellow-400 opacity-75 hidden">
                Sign in to save wins to the leaderboard.
            </p>
        </div>
    </main>

    <!-- RESULTS SCREEN -->
    <main id="results-screen" class="screen hidden">
        <div class="text-center p-8 rounded-2xl flex flex-col items-center gap-5" style="background:var(--surface);border:2px solid var(--gold)">
            <h2 id="result-title" class="text-3xl font-extrabold" style="color:var(--gold)">Tournament Champion!</h2>
            <div class="w-48 h-72 sm:w-56 sm:h-84 rounded-2xl overflow-hidden border-4" style="border-color:var(--gold)">
                <img id="winner-img" src="" class="w-full h-full object-cover">
            </div>
            <h3 id="winner-name" class="text-2xl font-bold"></h3>
            <p id="winner-category" class="text-base" style="color:var(--on-surface-var)"></p>
            <button id="play-again-btn" class="btn btn-primary text-base">
                <span class="material-symbols-outlined">replay</span>New Tournament
            </button>
        </div>
    </main>

    <!-- LEADERBOARD SCREEN -->
    <main id="leaderboard-screen" class="screen hidden">
        <div class="w-full max-w-2xl p-6 rounded-2xl" style="background:var(--surface);border:1px solid var(--outline-var)">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-bold">Leaderboard</h2>
                <button id="back-to-setup-btn" class="btn btn-secondary">Back</button>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 mb-4 items-center">
                <select id="leaderboard-category-select" class="form-select sm:flex-1"></select>
                <button id="reset-wins-btn" class="btn btn-danger sm:w-auto w-full">
                    <span class="material-symbols-outlined">delete_forever</span>Reset All

            <div id="leaderboard-content" class="flex flex-col gap-2 max-h-[60vh] overflow-y-auto pr-1"></div>

</div>

<!-- LOGIN MODAL -->
<div id="login-modal" class="modal-bg hidden" onclick="closeLoginModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 class="text-xl font-bold mb-4 text-center">Sign In</h2>
        <div class="flex flex-col gap-3">
            <input type="email"    id="admin-email"    placeholder="Email"    class="form-input">
            <input type="password" id="admin-password" placeholder="Password" class="form-input">
            <button id="login-submit-btn" class="btn btn-primary w-full">Sign In</button>

        </div>
    </div>
</div>

<!-- CATEGORY MODAL -->
<div id="category-modal" class="modal-bg hidden" onclick="closeCategoryModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold">Manage Categories</h2>
            <button onclick="closeCategoryModal()" class="btn btn-secondary !p-2 !rounded-full">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">New Category</label>
            <div class="flex gap-2">
                <input type="text" id="new-category-input" placeholder="Category name…" class="form-input flex-grow">
                <button id="add-category-btn" class="btn btn-primary flex-shrink-0">Add</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold mb-2">Existing Categories</label>
            <div id="category-list" class="flex flex-col gap-2 max-h-60 overflow-y-auto"></div>
        </div>
    </div>
</div>

<script>
// ─── Firebase ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyDrEU_QEuvf960ZPxo29n6x8N9K7yGIkCQ",
    authDomain: "karaktergalerisi-dc337.firebaseapp.com",
    projectId: "karaktergalerisi-dc337",
    storageBucket: "karaktergalerisi-dc337.firebasestorage.app",
    messagingSenderId: "486669559067",
    appId: "1:486669559067:web:20c76a78a41d9bc0bbdfbe"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// ─── State ────────────────────────────────────────────────────────────────────
const dom = {};
let allCharacters      = [];   // raw Firestore docs
let alternativeUniverses = []; // AU definitions
let gameState          = {};
const SCREENS = ['setup', 'game', 'results', 'leaderboard'];

// ─── Screen helpers ───────────────────────────────────────────────────────────
function showScreen(id) {
    SCREENS.forEach(s => document.getElementById(`${s}-screen`).classList.add('hidden'));
    document.getElementById(`${id}-screen`).classList.remove('hidden');
}

// ─── Auth UI ──────────────────────────────────────────────────────────────────
function updateAuthUI(user) {
    if (user) {
        dom.authActionText.textContent = 'Sign Out';
        dom.authActionIcon.textContent = 'logout';
        dom.authActionBtn.onclick = () => { if (confirm('Sign out?')) auth.signOut(); };
        dom.loginToSaveInfo.classList.add('hidden');
        dom.resetWinsBtn.disabled = false;
        dom.manageCategoriesBtn.classList.remove('hidden');
        dom.setupCard.style.display = '';
        dom.loginPrompt.classList.add('hidden');
    } else {
        dom.authActionText.textContent = 'Sign In';
        dom.authActionIcon.textContent = 'login';
        dom.authActionBtn.onclick = openLoginModal;
        dom.loginToSaveInfo.classList.remove('hidden');
        dom.resetWinsBtn.disabled = true;
        dom.manageCategoriesBtn.classList.add('hidden');
        dom.setupCard.style.display = 'none';
        dom.loginPrompt.classList.remove('hidden');
    }
}
function openLoginModal()  { dom.loginModal.classList.remove('hidden'); }
function closeLoginModal() { dom.loginModal.classList.add('hidden'); }
function openCategoryModal()  { dom.categoryModal.classList.remove('hidden'); loadCategoriesForManagement(); }
function closeCategoryModal() { dom.categoryModal.classList.add('hidden'); }

// ─── Categories ───────────────────────────────────────────────────────────────
async function loadCategoriesFromFirestore() {
    try {
        const snap = await db.collection('categories').orderBy('name').get();
        const cats = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Category radio chips
        dom.categoryContainer.innerHTML = '';
        if (cats.length) {
            cats.forEach((cat, i) => {
                const lbl = document.createElement('label');
                lbl.className = 'mode-chip';
                lbl.innerHTML = `<input type="radio" name="category" value="${cat.name}"><span class="material-symbols-outlined chip-icon">label</span>${cat.name}`;
                if (i === 0) { lbl.querySelector('input').checked = true; lbl.classList.add('selected'); }
                dom.categoryContainer.appendChild(lbl);
            });
        } else {
            dom.categoryContainer.innerHTML = '<p class="col-span-2 text-sm" style="color:var(--on-surface-var)">No categories yet.</p>';
        }

        // Leaderboard select
        dom.leaderboardCategorySelect.innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    } catch(e) {
        console.error('Categories load error:', e);
        dom.categoryContainer.innerHTML = '<p class="text-red-400 text-sm col-span-2">Failed to load categories.</p>';
    }
}

async function loadCategoriesForManagement() {
    dom.categoryList.innerHTML = '<p class="text-sm" style="color:var(--on-surface-var)">Loading…</p>';
    const snap = await db.collection('categories').orderBy('name').get();
    const cats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    dom.categoryList.innerHTML = '';
    cats.forEach(cat => {
        const row = document.createElement('div');
        row.className = 'flex justify-between items-center p-2 rounded-lg';
        row.style.background = 'var(--surface)';
        row.innerHTML = `<span class="font-semibold">${cat.name}</span>`;
        const del = document.createElement('button');
        del.className = 'btn btn-danger !p-2 !rounded-full';
        del.innerHTML = '<span class="material-symbols-outlined">delete</span>';
        del.onclick = () => deleteCategory(cat.id, cat.name);
        row.appendChild(del);
        dom.categoryList.appendChild(row);
    });
}

async function addCategory() {
    const name = dom.newCategoryInput.value.trim();
    if (!name) return;
    await db.collection('categories').add({ name });
    dom.newCategoryInput.value = '';
    await Promise.all([loadCategoriesFromFirestore(), loadCategoriesForManagement()]);
}

async function deleteCategory(id, name) {
    if (!confirm(`Delete category "${name}"?`)) return;
    await db.collection('categories').doc(id).delete();
    await Promise.all([loadCategoriesFromFirestore(), loadCategoriesForManagement()]);
}

// ─── AU mode chips builder ────────────────────────────────────────────────────
function buildAuModeChips() {
    // Remove old AU chips
    document.querySelectorAll('.au-mode-chip').forEach(el => el.remove());
    const grid = document.getElementById('mode-grid');

    alternativeUniverses.forEach(au => {
        const lbl = document.createElement('label');
        lbl.className = 'mode-chip au-chip au-mode-chip';
        const icon = au.icon || 'auto_fix_high';
        lbl.innerHTML = `
            <input type="radio" name="mode" value="au_${au.id}">
            <span class="material-symbols-outlined chip-icon" style="color:${au.color||'var(--au)'}">${icon}</span>
            <span style="color:${au.color||'var(--au)'}">${au.name}</span>
        `;
        grid.appendChild(lbl);
    });
}

// ─── Contestant preparation ───────────────────────────────────────────────────
function prepareContestants(settings) {
    const mode = settings.mode;
    const sourceList = allCharacters.filter(c => !c.isDismissed);
    let pool = [];

    // Helper: pick the correct image for a fusion (always gif/imageUrl, never previewUrl for the card)
    const fusionImg = (char) => char.imageUrl || char.previewUrl || '';

    if (mode.startsWith('au_')) {
        // AU mode: only chars/fusions that have an entry in this AU
        const auId = mode.slice(3);
        const auDef = alternativeUniverses.find(a => a.id === auId);
        sourceList.forEach(char => {
            const entry = char.auData?.[auId];
            if (!entry) return;
            if (char.isFusion) {
                if (entry.fusionImageUrl) {
                    pool.push({
                        id: `${char.id}_au_${auId}`,
                        name: char.name,
                        label: '4★',
                        imageUrl: entry.fusionImageUrl,
                        auName: auDef?.name,
                        auColor: auDef?.color,
                    });
                }
            } else {
                if (entry.star3ImageUrl) {
                    pool.push({
                        id: `${char.id}_au_${auId}`,
                        name: char.name,
                        label: '3★',
                        imageUrl: entry.star3ImageUrl,
                        auName: auDef?.name,
                        auColor: auDef?.color,
                    });
                }
            }
        });

    } else if (mode === 'fusions') {
        sourceList.filter(c => c.isFusion).forEach(char => {
            pool.push({ id: char.id, name: char.name, label: '4★', imageUrl: fusionImg(char) });
        });

    } else if (mode === 'stars_1' || mode === 'stars_2' || mode === 'stars_3') {
        const star = parseInt(mode.split('_')[1]);
        sourceList.filter(c => !c.isFusion).forEach(char => {
            const imgUrl = star === 1 ? char.imageUrl : char.evolutions?.find(e => e.star === star)?.imageUrl;
            if (imgUrl) pool.push({ id: `${char.id}_${star}`, name: char.name, label: `${star}★`, imageUrl: imgUrl });
        });

    } else if (mode === 'all') {
        sourceList.forEach(char => {
            if (char.isFusion) {
                pool.push({ id: char.id, name: char.name, label: '4★', imageUrl: fusionImg(char) });
            } else {
                [1, 2, 3].forEach(star => {
                    const imgUrl = star === 1 ? char.imageUrl : char.evolutions?.find(e => e.star === star)?.imageUrl;
                    if (imgUrl) pool.push({ id: `${char.id}_${star}`, name: char.name, label: `${star}★`, imageUrl: imgUrl });
                });
            }
        });

    } else if (mode === 'random') {
        sourceList.forEach(char => {
            if (char.isFusion) {
                pool.push({ id: char.id, name: char.name, label: '4★', imageUrl: fusionImg(char) });
            } else {
                [1, 2, 3].forEach(star => {
                    const imgUrl = star === 1 ? char.imageUrl : char.evolutions?.find(e => e.star === star)?.imageUrl;
                    if (imgUrl) pool.push({ id: `${char.id}_${star}`, name: char.name, label: `${star}★`, imageUrl: imgUrl });
                });
            }
        });
        pool.sort(() => Math.random() - 0.5);
        pool = pool.slice(0, settings.count || 16);
    }

    return pool;
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame(settings) {
    gameState = { settings, round: 1, match: 0, winners: [], byeWinner: null };

    if (settings.mode === 'absolute_war') {
        gameState.absoluteWar = { stage: 1, allWinners: [] };
        startAbsoluteWarStage();
        return;
    }

    const pool = prepareContestants(settings);
    if (pool.length < 2) { alert('Not enough contestants for this mode (need at least 2).'); return; }
    gameState.contestants = shuffle(pool);
    showScreen('game');
    showPairing();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startAbsoluteWarStage() {
    const stage = gameState.absoluteWar.stage;
    let pool, stageName;
    const stageMap = { 1: ['stars_1','1★ Battle'], 2: ['stars_2','2★ Battle'], 3: ['stars_3','3★ Battle'], 4: ['fusions','Fusions Battle'] };
    if (stageMap[stage]) {
        const [modeKey, name] = stageMap[stage];
        stageName = name;
        pool = prepareContestants({ mode: modeKey });
    } else {
        stageName = 'CHAMPIONS FINAL';
        pool = [...gameState.absoluteWar.allWinners];
    }
    if (pool.length < 2) {
        if (stage < 5) { gameState.absoluteWar.stage++; startAbsoluteWarStage(); return; }
        alert('No contestants for Absolute War!'); showScreen('setup'); return;
    }
    gameState.currentStageName = stageName;
    gameState.contestants = shuffle(pool);
    gameState.round = 1; gameState.match = 0; gameState.winners = []; gameState.byeWinner = null;
    showScreen('game');
    showPairing();
}

function showPairing() {
    const { contestants, match } = gameState;
    const totalMatches = Math.floor(contestants.length / 2);

    // Round label
    const roundLabel =
        totalMatches <= 1 ? 'FINAL' :
        totalMatches <= 2 ? 'Semi-Final' :
        totalMatches <= 4 ? 'Quarter-Final' :
        `Round ${gameState.round}`;
    dom.roundTitle.textContent = gameState.settings.mode === 'absolute_war'
        ? `${gameState.currentStageName} — ${roundLabel}` : roundLabel;
    dom.matchInfo.textContent = `Match ${match + 1} of ${totalMatches}`;

    const catRadio = dom.setupForm.querySelector('input[name="category"]:checked');
    dom.categoryInfo.textContent = catRadio ? `Category: ${catRadio.value}` : '';

    // Progress
    const pct = Math.round((match / totalMatches) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';

    // Cards — disable while animating
    [dom.c1_card, dom.c2_card].forEach(c => {
        c.style.pointerEvents = 'auto';
        c.classList.remove('winner-glow');
    });

    const [p1, p2] = [contestants[match * 2], contestants[match * 2 + 1]];
    gameState.currentPair = [p1, p2];

    // ── KEY FIX: force image reload by clearing src first ──
    setContestant(dom.c1_img, dom.c1_name, dom.c1_card, p1);
    setContestant(dom.c2_img, dom.c2_name, dom.c2_card, p2);
}

function setContestant(imgEl, nameEl, cardEl, contestant) {
    // Wipe src first so the browser always reloads (fixes stale GIF bug)
    imgEl.src = '';
    imgEl.alt = contestant.name;

    // Small RAF delay ensures browser registers the src="" before new src
    requestAnimationFrame(() => { imgEl.src = contestant.imageUrl; });

    // Name + optional star label + AU badge
    let nameHtml = `<strong>${contestant.name}</strong>`;
    if (contestant.label) nameHtml += ` <span style="opacity:.6;font-weight:600">(${contestant.label})</span>`;
    if (contestant.auName) {
        nameHtml += ` <span class="au-badge-small" style="background:rgba(${hexToRgb(contestant.auColor)||'100,220,180'},.15);border-color:rgba(${hexToRgb(contestant.auColor)||'100,220,180'},.4);color:${contestant.auColor||'var(--au)'};">${contestant.auName}</span>`;
    }
    nameEl.innerHTML = nameHtml;

    // AU card border
    cardEl.classList.toggle('au-card', !!contestant.auName);
}

function hexToRgb(hex) {
    if (!hex || !hex.startsWith('#')) return null;
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

function castVote(winnerIndex) {
    [dom.c1_card, dom.c2_card].forEach(c => c.style.pointerEvents = 'none');
    const winnerCard = winnerIndex === 0 ? dom.c1_card : dom.c2_card;
    winnerCard.classList.add('winner-glow');
    const winner = gameState.currentPair[winnerIndex];
    gameState.winners.push(winner);
    if (auth.currentUser) saveWin(winner, gameState.settings.category);

    setTimeout(() => advanceGame(), 1100);
}

function advanceGame() {
    gameState.match++;
    const { contestants, match, winners } = gameState;

    if (match * 2 < contestants.length) {
        // More matches in this round
        showPairing();
        return;
    }

    // Round over — collect winners + bye
    let next = [...winners];
    if (gameState.byeWinner) { next.push(gameState.byeWinner); gameState.byeWinner = null; }

    if (next.length === 1) {
        // Tournament winner
        if (gameState.settings.mode === 'absolute_war' && gameState.absoluteWar.stage < 5) {
            gameState.absoluteWar.allWinners.push(next[0]);
            gameState.absoluteWar.stage++;
            startAbsoluteWarStage();
        } else {
            showWinner(next[0]);
        }
        return;
    }

    // Odd number → one gets a bye
    if (next.length % 2 !== 0) { gameState.byeWinner = next.pop(); }

    gameState.contestants = next;
    gameState.winners = [];
    gameState.round++;
    gameState.match = 0;
    showPairing();
}

async function saveWin(character, category) {
    if (!auth.currentUser || !category) return;
    try {
        await db.collection('wins').add({
            userId: auth.currentUser.uid,
            characterId: character.id,
            characterName: character.name,
            category,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });
    } catch(e) { console.warn('Win save failed:', e); }
}

function showWinner(winner) {
    dom.winnerImg.src = '';
    requestAnimationFrame(() => { dom.winnerImg.src = winner.imageUrl; });
    dom.winnerName.textContent = winner.name + (winner.label ? ` (${winner.label})` : '');
    dom.resultTitle.textContent = gameState.settings.mode === 'absolute_war' ? 'ABSOLUTE WAR CHAMPION!' : 'Tournament Champion!';
    const catRadio = dom.setupForm.querySelector('input[name="category"]:checked');
    dom.winnerCategory.textContent = catRadio ? `${catRadio.value} Category` : '';
    showScreen('results');
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────
async function fetchAndDisplayLeaderboard() {
    const category = dom.leaderboardCategorySelect.value;
    if (!category) { dom.leaderboardContent.innerHTML = '<p style="color:var(--on-surface-var)">Select a category.</p>'; return; }
    dom.leaderboardContent.innerHTML = '<p style="color:var(--on-surface-var)">Loading…</p>';
    try {
        const snap = await db.collection('wins').where('category', '==', category).get();
        if (snap.empty) { dom.leaderboardContent.innerHTML = '<p style="color:var(--on-surface-var)">No wins recorded for this category yet.</p>'; return; }

        const counts = {};
        snap.forEach(doc => {
            const { characterId, characterName } = doc.data();
            if (!counts[characterId]) counts[characterId] = { name: characterName, wins: 0 };
            counts[characterId].wins++;
        });
        const sorted = Object.values(counts).sort((a,b) => b.wins - a.wins);

        dom.leaderboardContent.innerHTML = '';
        sorted.forEach((entry, i) => {
            const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
            const row = document.createElement('div');
            row.className = 'lb-row';
            row.innerHTML = `
                <span class="lb-rank ${rankClass}">${i + 1}</span>
                <span class="flex-grow font-semibold">${entry.name}</span>
                <span class="font-bold" style="color:var(--primary)">${entry.wins} <span style="font-weight:400;opacity:.7">win${entry.wins !== 1 ? 's' : ''}</span></span>
            `;
            dom.leaderboardContent.appendChild(row);
        });
    } catch(e) {
        dom.leaderboardContent.innerHTML = '<p class="text-red-400">Failed to load leaderboard.</p>';
    }
}

async function resetWins() {
    if (!auth.currentUser || !confirm('Permanently delete ALL win records? This cannot be undone!')) return;
    dom.leaderboardContent.innerHTML = '<p style="color:var(--on-surface-var)">Deleting…</p>';
    const snap = await db.collection('wins').get();
    const batch = db.batch();
    snap.docs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    alert('All win records deleted.');
    fetchAndDisplayLeaderboard();
}

// ─── Mode chip interactions ───────────────────────────────────────────────────
function setupModeChips() {
    document.getElementById('mode-grid').addEventListener('change', e => {
        if (e.target.type !== 'radio') return;
        document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
        e.target.closest('.mode-chip').classList.add('selected');
        const isRandom = e.target.value === 'random';
        dom.randomCountContainer.style.display = isRandom ? '' : 'none';
    });

    // Category chips
    dom.categoryContainer.addEventListener('change', e => {
        if (e.target.type !== 'radio') return;
        document.querySelectorAll('#category-container .mode-chip').forEach(c => c.classList.remove('selected'));
        e.target.closest('.mode-chip').classList.add('selected');
    });
}
